<!DOCTYPE html>
<html>
    <head>
        <title>Student Register</title>
    </head>
    <body>

        <h2>Enter Name</h2>
        <input type="text" id="name" placeholder="Enter your full name">

        <h2>Enter Email</h2>
        <input type="text" id="email" placeholder="Enter mail ID">

        <h2>Enter USN</h2>
        <input type="text" id="usn" placeholder="Enter USN">

        <h2>Enter Password</h2>
        <input type="text" id="password" placeholder="Enter Password">

        <h2>Confirm Password</h2>
        <input type="text" id="confirmPassword" placeholder="Confirm Password"><br><br>
        
        <button type="button" onclick="registerStudent()">Register</button>

        <script>
            async function registerStudent(){
                const name=document.getElementById("name").value;
                const email=document.getElementById("email").value;
                const usn=document.getElementById("usn").value;
                const password=document.getElementById("password").value;
                const confirmPassword=document.getElementById("confirmPassword").value;

                if(password !== confirmPassword){
                    alert("Passwords do not match");
                    return;
                }

                const student={name,email,usn,password};
                const res=await fetch("http://localhost:5000/auth/students",{
                    method:"POST",
                    headers:{
                        "Content-type":"application/json"
                    },
                    body: JSON.stringify(student)
                });

                const data=await res.json();
                alert(data.message||"Student Registered");
            }
        </script>
    </body>
</html>
