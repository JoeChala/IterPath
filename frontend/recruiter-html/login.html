<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IterPath Login</title>
    </head>
    <body>
        <form id="recruiterForm" method="POST">
            <label for="name">Name</label><br> 
            <input type="text" id="recruiter-name" placeholder="Enter your name" required><br>
            <label for="email">Email</label><br> 
            <input type="email" id="recruiter-email" placeholder="Enter your email" required><br>
            <label for="company">Company Name</label><br> 
            <input type="text" id="recruiter-company" placeholder="Enter your company name" required><br>
            <label for="designation">Designation</label><br>
            <select id="recruiter-designation" required>
                <option value="hr-manager">HR Manager</option>
                <option value="hr-exec">HR Executive</option>
                <option value="tas">Talent Acquisition Specialist</option>
                <option value="tam">Talent Acquisition Manager</option>
                <option value="campus-recruiter">Campus Recruiter</option>
                <option value="hiring-manager">Hiring Manager</option>
                <option value="swe">Software Engineer</option>
                <option value="senior-swe">Senior Software Engineer</option>
                <option value="engg-manager">Engineering Manager</option>
                <option value="other">Other</option>
            </select><br>
            <input type="submit" value="Submit">
        </form>
        <script>
            async function completeRecruiterProfile(){
                document.getElementById("recruiterForm").addEventListener("submit", function(e){
                    e.preventDefault(); // stop page refresh
                    const name = document.getElementById("recruiter-name").value;
                    const email = document.getElementById("recruiter-email").value;
                    const company = document.getElementById("recruiter-company").value;
                    const designation = document.getElementById("recruiter-designation").value;
                });    
                const res = await fetch("http://localhost:5000/auth/recruiters/complete-profile",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({name,email,company,designation})
                });

                const data = await res.json();

                if(data.success){
                    alert("Login successful");
                }else{
                    alert(data.message);
                }
            }
        </script>
    </body>
</html>
